services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: app/.env
        required: false
    volumes:
      - ./portfolio.json:/app/portfolio.json
      - ./profile.json:/app/profile.json
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
